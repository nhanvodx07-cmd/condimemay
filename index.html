<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quy đổi điểm V-SAT - CTUMP năm 2025</title>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" type="image/x-icon" href="Flag_of_Vietnam.svg.webp">
</head>
<body>

<div class="container">
    <h2>Quy đổi điểm V-SAT CTUMP</h2>
    <div class="input-group">
        <label>Toán V-SAT (0-150):</label>
        <input type="number" id="toan" placeholder="Ví dụ: 120 hoặc 120.5" step="0.5" min="0" max="150">
    </div>
    <div class="input-group">
        <label>Hóa học V-SAT (0-150):</label>
        <input type="number" id="hoa" placeholder="Ví dụ: 120 hoặc 120.5" step="0.5" min="0" max="150">
    </div>
    <div class="input-group">
        <label>Sinh học V-SAT (0-150):</label>
        <input type="number" id="sinh" placeholder="Ví dụ: 120 hoặc 120.5" step="0.5" min="0" max="150">
    </div>
    <button onclick="calculate()">TÍNH ĐIỂM NGAY</button>
    <p class="note-bottom"> <a href="https://media.ctump.edu.vn//Media//1_TH1076//FolderFunc//202507//Documents/yct-tb-nguong-dau-vao-va-quy-doi-diem-chinh-quy-2025-227-20250722074724-e.pdf#toolbar=0" target="_blank" >Dựa trên Công văn số 1672/TB-ĐHYDCT ngày 22/07/2025 </a></p>
</div>

<div id="overlay" class="overlay" onclick="closePopup()"></div>

<div id="resultArea" class="result-box">
    <div class="res-item">
        <span>Toán quy đổi:</span> 
        <div class="val-group">
            <span class="val-main" id="resToan">0</span>
            <span class="val-top" id="topToan"></span>
        </div>
    </div>
    <div class="res-item">
        <span>Hóa quy đổi:</span> 
        <div class="val-group">
            <span class="val-main" id="resHoa">0</span>
            <span class="val-top" id="topHoa"></span>
        </div>
    </div>
    <div class="res-item">
        <span>Sinh quy đổi:</span> 
        <div class="val-group">
            <span class="val-main" id="resSinh">0</span>
            <span class="val-top" id="topSinh"></span>
        </div>
    </div>
    
    <div class="res-item" style="border-bottom: none; margin-top: 10px; color: #aaa; font-style: italic; font-size: 14px;">
        <span>Tổng điểm V-SAT gốc:</span> <span id="resRawTotal" style="font-weight: bold;">0</span>
    </div>
    
    <div class="total-row">TỔNG: <span id="resTotal">0</span></div>
    <div class="ref-note">Kết quả dựa trên phổ điểm năm 2025, mang tính chất tham khảo.</div>
    <button class="close-btn" onclick="closePopup()">Xong</button>
</div>

<script src="script.js"></script>

</body>
</html>
